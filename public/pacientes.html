<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Panel de Pacientes | Mente Viva</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF9F6;font-family:'DM Sans',sans-serif;color:#2C2A25}
.sf{font-family:'Cormorant Garamond',Georgia,serif}
.wrap{max-width:800px;margin:0 auto;padding:28px 16px 48px}
.card{background:#fff;border:1.5px solid #EBE8E2;border-radius:14px;padding:16px 18px;margin-bottom:10px}
.card-lg{border-radius:18px;padding:28px 24px;margin-bottom:16px}
.btn{width:100%;padding:14px;background:#3D9060;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px}
.row{display:flex;align-items:center;gap:16px;cursor:pointer;transition:transform .2s}
.row:hover{transform:translateX(4px)}
.pill{font-size:13px;font-weight:700;padding:3px 12px;border-radius:20px}
.bt{height:4px;border-radius:2px;background:#F2F0EB;overflow:hidden;margin-bottom:5px}
.bf{height:100%;border-radius:2px}
.pri{border:1.5px solid #EBE8E2;border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.hide{display:none}
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
input:focus{outline:none;border-color:#3D9060;box-shadow:0 0 0 3px rgba(61,144,96,.08)}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="card card-lg" style="text-align:center;max-width:400px;width:100%">
    <div style="font-size:32px;margin-bottom:12px">&#128274;</div>
    <h1 class="sf" style="font-size:24px;font-weight:600">Panel de Pacientes</h1>
    <p style="font-size:13px;color:#9B9590;margin:6px 0 24px">Mente Viva &#183; Dani Navarro</p>
    <input type="password" id="keyInput" placeholder="Clave de acceso" style="width:100%;padding:13px 16px;background:#FAFAF7;border:1.5px solid #EBE8E2;border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;color:#2C2A25;margin-bottom:12px">
    <p id="errorMsg" style="color:#C75B4A;font-size:13px;margin-bottom:10px" class="hide"></p>
    <button class="btn" id="loginBtn">Ingresar</button>
  </div>
</div>

<div id="dashboard" class="hide">
  <div class="wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <div>
        <h1 class="sf" style="font-size:28px;font-weight:600">Panel de Pacientes</h1>
        <p style="font-size:13px;color:#9B9590;margin-top:2px">Mente Viva &#183; Quiz Bienestar</p>
      </div>
      <a href="/" style="font-size:13px;color:#3D9060;text-decoration:none;font-weight:600">&#8592; Quiz</a>
    </div>
    <div class="g3" id="statsDiv"></div>
    <div id="contentDiv"></div>
  </div>
</div>

<script>
(function(){
  var COLORS = ["#C75B4A","#D4895A","#D4A84A","#6BAF7B","#3D9060"];
  var LABELS = ["Necesita atenci\u00f3n","En riesgo","En desarrollo","Buen camino","Fortaleza"];
  var BGCOLORS = ["#FEF2F0","#FFF5EE","#FFF9EC","#F0F8F2","#E8F5EC"];
  var NAMES = {sueno:"Sue\u00f1o",alimentacion:"Alimentaci\u00f3n",movimiento:"Movimiento",estres:"Estr\u00e9s",emocional:"Emociones",naturaleza:"Naturaleza",vinculos:"V\u00ednculos",suplementacion:"Suplementaci\u00f3n",digital:"Digital"};
  var ICONS = {sueno:"\ud83c\udf19",alimentacion:"\ud83e\udd57",movimiento:"\ud83c\udfc3",estres:"\ud83e\uddd8\u200d\u2640\ufe0f",emocional:"\ud83d\udc9c",naturaleza:"\ud83c\udf3f",vinculos:"\ud83e\udd1d",suplementacion:"\ud83d\udc8a",digital:"\ud83d\udcf1"};

  // Descripciones por área para el resumen al paciente
  var AREA_DESC = {
    sueno: {
      bajo: "Tu descanso es una prioridad urgente. Sin sue\u00f1o reparador, ning\u00fan otro h\u00e1bito puede funcionar bien. Vamos a trabajar en tu higiene del sue\u00f1o desde la primera sesi\u00f3n.",
      medio: "Tu sue\u00f1o tiene margen de mejora importante. Peque\u00f1os cambios en tu rutina nocturna pueden transformar tu energ\u00eda y estado de \u00e1nimo diario.",
      alto: "Tu descanso es una base s\u00f3lida. Vamos a cuidarlo y optimizarlo para que siga siendo un pilar en tu bienestar."
    },
    alimentacion: {
      bajo: "Tu alimentaci\u00f3n es un \u00e1rea clave a transformar. Lo que com\u00e9s impacta directamente en tu energ\u00eda, humor y claridad mental. Vamos a construir un plan realista y sostenible para vos.",
      medio: "Tu alimentaci\u00f3n tiene buenas bases pero hay oportunidades concretas de mejora. Con ajustes simples y personalizados, pod\u00e9s notar cambios importantes.",
      alto: "Tu relaci\u00f3n con la alimentaci\u00f3n es una fortaleza. Seguiremos potenci\u00e1ndola con enfoque funcional y antiinflamatorio."
    },
    movimiento: {
      bajo: "Tu cuerpo necesita m\u00e1s movimiento. No hablamos de gym ni de sacrificio, sino de encontrar la forma de moverse que a vos te nutra y te genere energ\u00eda.",
      medio: "Ten\u00e9s un v\u00ednculo con el movimiento que podemos profundizar. Vamos a ver qu\u00e9 tipo de actividad f\u00edsica te energiza y te sostiene en el tiempo.",
      alto: "El movimiento es una de tus fortalezas. Vamos a asegurarnos de que est\u00e9 alineado con tus objetivos y que tu cuerpo tenga la recuperaci\u00f3n que necesita."
    },
    estres: {
      bajo: "Tu nivel de estr\u00e9s es una se\u00f1al de alerta importante. El sistema nervioso necesita atenci\u00f3n urgente. Vamos a trabajar herramientas concretas para regularlo.",
      medio: "El estr\u00e9s est\u00e1 presente y est\u00e1 afectando tu calidad de vida. Vamos a explorar qu\u00e9 lo dispara y c\u00f3mo respond\u00e9s, para darte herramientas reales.",
      alto: "Gestion\u00e1s bien el estr\u00e9s. Seguiremos fortaleciendo tu capacidad de regulaci\u00f3n y resiliencia."
    },
    emocional: {
      bajo: "Tu mundo emocional necesita espacio y atenci\u00f3n. Aprenderemos a identificar, validar y canalizar tus emociones de manera saludable.",
      medio: "Tu vida emocional tiene potencial para ganar profundidad y equilibrio. Vamos a trabajar en tu autoconocimiento y en herramientas para procesar lo que sent\u00eds.",
      alto: "Tu inteligencia emocional es una fortaleza genuina. Seguiremos desarrollando tu capacidad de conexi\u00f3n con vos mismo/a y con los dem\u00e1s."
    },
    naturaleza: {
      bajo: "La reconexi\u00f3n con la naturaleza puede ser m\u00e1s poderosa de lo que imagin\u00e1s para tu bienestar. Vamos a encontrar formas pr\u00e1cticas de incorporarla en tu d\u00eda a d\u00eda.",
      medio: "Expos\u00e9s a la naturaleza con cierta frecuencia, pero hay espacio para profundizar este h\u00e1bito y aprovechar todos sus beneficios.",
      alto: "Tu contacto con la naturaleza es un recurso valioso. Seguiremos aprovech\u00e1ndolo como ancla de bienestar."
    },
    vinculos: {
      bajo: "Tus v\u00ednculos y red de apoyo es un \u00e1rea que merece atenci\u00f3n. Las conexiones significativas son esenciales para la salud integral. Vamos a explorar c\u00f3mo nutrirlas.",
      medio: "Tus relaciones tienen un buen potencial. Vamos a ver c\u00f3mo fortalecer tu red de apoyo y mejorar la calidad de tus conexiones.",
      alto: "Tus v\u00ednculos son una fuente real de fortaleza. Seguiremos cultivando relaciones que te nutran y te sostengan."
    },
    suplementacion: {
      bajo: "La suplementaci\u00f3n inteligente puede ser una herramienta poderosa para tu bienestar. Vamos a evaluar qu\u00e9 necesita tu cuerpo seg\u00fan tus resultados.",
      medio: "Ten\u00e9s una base de suplementaci\u00f3n pero hay margen para optimizarla. Vamos a revisar qu\u00e9 ajustes pueden potenciar tus resultados.",
      alto: "Tu suplementaci\u00f3n est\u00e1 bien encaminada. Seguiremos ajust\u00e1ndola seg\u00fan tus necesidades y objetivos."
    },
    digital: {
      bajo: "Tu relaci\u00f3n con la tecnolog\u00eda est\u00e1 afectando tu bienestar de forma significativa. Trabajaremos juntos/as en establecer l\u00edmites saludables y recuperar presencia en tu vida.",
      medio: "Existe una oportunidad importante de mejorar tu higiene digital. Peque\u00f1os cambios en c\u00f3mo us\u00e1s la tecnolog\u00eda pueden tener un gran impacto.",
      alto: "Ten\u00e9s una buena relaci\u00f3n con la tecnolog\u00eda. Seguiremos cuidando ese equilibrio."
    }
  };

  function getAreaDesc(key, score) {
    var d = AREA_DESC[key];
    if (!d) return "";
    if (score <= 2) return d.bajo;
    if (score <= 3) return d.medio;
    return d.alto;
  }

  function generateSummaryText(p) {
    var sorted = Object.entries(p.scores).sort(function(a,b){return a[1]-b[1];});
    var prioridades = sorted.slice(0,3);
    var fortalezas = sorted.slice(-2).reverse().filter(function(e){return e[1]>=4;});
    var nombrePrimero = p.nombre.split(" ")[0];

    var txt = "Hola " + nombrePrimero + " \ud83c\udf3f\n\n";
    txt += "Gracias por completar tu Quiz de Bienestar Mente Viva. ";
    txt += "Estos son los resultados de tu evaluaci\u00f3n integral y las \u00e1reas en las que vamos a enfocarnos juntos/as:\n\n";
    txt += "\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\n";
    txt += "\ud83c\udfaf PUNTAJE GENERAL: " + p.promedio + "/5\n";
    txt += "\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\n\n";
    txt += "\ud83d\udd0d \u00c1REAS PRIORITARIAS A TRABAJAR:\n\n";
    prioridades.forEach(function(e, i) {
      var k=e[0], v=e[1];
      txt += (i+1) + ". " + ICONS[k] + " " + NAMES[k].toUpperCase() + " \u2014 " + v + "/5\n";
      txt += getAreaDesc(k, v) + "\n\n";
    });
    if (fortalezas.length > 0) {
      txt += "\u2728 TUS FORTALEZAS:\n\n";
      fortalezas.forEach(function(e) {
        var k=e[0], v=e[1];
        txt += ICONS[k] + " " + NAMES[k] + " (" + v + "/5) \u2014 " + getAreaDesc(k, v) + "\n\n";
      });
    }
    txt += "\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\n\n";
    txt += "Estas son las \u00e1reas desde las que vamos a construir tu bienestar integral. ";
    txt += "En nuestros pr\u00f3ximos encuentros, trabajaremos con estrategias personalizadas, concretas y sostenibles para vos.\n\n";
    txt += "Con cari\u00f1o,\nDani Navarro \u2022 Mente Viva";
    return txt;
  }

  var patients = [];

  var keyInput = document.getElementById("keyInput");
  var loginBtn = document.getElementById("loginBtn");
  var errorMsg = document.getElementById("errorMsg");
  var loginScreen = document.getElementById("loginScreen");
  var dashboardDiv = document.getElementById("dashboard");
  var statsDiv = document.getElementById("statsDiv");
  var contentDiv = document.getElementById("contentDiv");

  function doLogin() {
    var key = keyInput.value;
    if (!key) { showError("Ingres\u00e1 la clave"); return; }
    hideError();
    loginBtn.textContent = "Cargando...";
    fetch("/api/pacientes?key=" + encodeURIComponent(key))
      .then(function(r) { return r.json(); })
      .then(function(d) {
        loginBtn.textContent = "Ingresar";
        if (d.error) { showError(d.error); return; }
        patients = d.pacientes || [];
        loginScreen.style.display = "none";
        dashboardDiv.style.display = "block";
        renderList();
      })
      .catch(function(e) {
        loginBtn.textContent = "Ingresar";
        showError("Error de conexi\u00f3n");
      });
  }

  function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = "block"; }
  function hideError() { errorMsg.style.display = "none"; }

  function fmt(d) {
    if (!d) return "\u2014";
    return new Date(d).toLocaleDateString("es-AR", {day:"2-digit", month:"short", year:"numeric"});
  }

  function radar(sc, sz) {
    var cx=sz/2, cy=sz/2, r=sz*0.38, ks=Object.keys(NAMES), n=ks.length, step=2*Math.PI/n, off=-Math.PI/2;
    function pt(i,v) { var a=off+i*step; return [cx+(v/5*r)*Math.cos(a), cy+(v/5*r)*Math.sin(a)]; }
    var s = '<svg viewBox="0 0 '+sz+' '+sz+'" width="'+sz+'" height="'+sz+'">';
    for (var l=1; l<=5; l++) {
      var pts = ks.map(function(_,i){ return pt(i,l).join(","); }).join(" ");
      s += '<polygon points="'+pts+'" fill="none" stroke="#E5E0D8" stroke-width="'+(l===5?'1.2':'0.5')+'"/>';
    }
    var dp = ks.map(function(k,i){ return pt(i,sc[k]||0).join(","); }).join(" ");
    s += '<polygon points="'+dp+'" fill="rgba(61,144,96,0.15)" stroke="#3D9060" stroke-width="1.5" stroke-linejoin="round"/>';
    ks.forEach(function(k,i) {
      var p=pt(i,sc[k]||0), v=Math.min(Math.max(sc[k]||1,1),5);
      s += '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3" fill="'+COLORS[v-1]+'" stroke="#fff" stroke-width="1.5"/>';
    });
    return s + "</svg>";
  }

  function renderList() {
    var ws = patients.filter(function(p){ return p.promedio > 0; });
    var av = ws.length > 0 ? (ws.reduce(function(a,p){ return a+p.promedio; },0)/ws.length).toFixed(1) : "0";
    statsDiv.innerHTML =
      '<div class="card" style="text-align:center"><span style="font-size:20px;display:block;margin-bottom:4px">\ud83d\udc65</span><span class="sf" style="font-size:22px;font-weight:700;display:block">'+patients.length+'</span><span style="font-size:11px;color:#9B9590">Total</span></div>' +
      '<div class="card" style="text-align:center"><span style="font-size:20px;display:block;margin-bottom:4px">\ud83d\udcca</span><span class="sf" style="font-size:22px;font-weight:700;display:block">'+ws.length+'</span><span style="font-size:11px;color:#9B9590">Con scores</span></div>' +
      '<div class="card" style="text-align:center"><span style="font-size:20px;display:block;margin-bottom:4px">\u2b50</span><span class="sf" style="font-size:22px;font-weight:700;display:block">'+av+'/5</span><span style="font-size:11px;color:#9B9590">Promedio</span></div>';
    var h = '<h2 class="sf" style="font-size:20px;font-weight:600;margin-bottom:12px">Pacientes del Quiz</h2>';
    if (!patients.length) h += '<p style="color:#9B9590">No hay pacientes a\u00fan</p>';
    else patients.forEach(function(p, idx) {
      var pc = p.promedio<=2?0 : p.promedio<=3?1 : p.promedio<=4?3 : 4;
      h += '<div class="card row" data-idx="'+idx+'">' +
        '<div>'+radar(p.scores,70)+'</div>' +
        '<div style="flex:1">' +
          '<div style="display:flex;justify-content:space-between;align-items:center">' +
            '<h3 style="font-size:16px;font-weight:600;margin:0">'+p.nombre+'</h3>' +
            (p.promedio>0 ? '<span class="pill" style="background:'+BGCOLORS[pc]+';color:'+COLORS[pc]+'">'+p.promedio+'/5</span>' : '') +
          '</div>' +
          '<p style="font-size:12px;color:#9B9590;margin-top:2px">'+p.email+'</p>' +
          '<div style="display:flex;gap:12px;margin-top:6px;font-size:11px;color:#9B9590">' +
            '<span>\ud83d\udcc5 '+fmt(p.fecha)+'</span>' +
            '<span>\ud83d\udce7 '+p.emails_sent+' enviados</span>' +
            '<span>\ud83d\udc41 '+p.opens+' abiertos</span>' +
          '</div>' +
        '</div>' +
        '<span style="font-size:18px;color:#D0D0D0">\u2192</span>' +
      '</div>';
    });
    contentDiv.innerHTML = h;
  }

  function showDetail(idx) {
    var p = patients[idx];
    var h = '<button id="backBtn" style="background:none;border:none;font-size:14px;color:#3D9060;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif;margin-bottom:16px">&#8592; Volver</button>';
    h += '<div class="card card-lg"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div>' +
      '<h2 class="sf" style="font-size:24px;font-weight:600">'+p.nombre+'</h2>' +
      '<p style="font-size:13px;color:#9B9590;margin-top:2px">'+p.email+'</p>' +
      '<p style="font-size:12px;color:#9B9590;margin-top:4px">Registrado: '+fmt(p.fecha)+' &#183; '+p.emails_sent+' emails, '+p.opens+' abiertos</p>' +
      '</div><div style="text-align:center"><div style="display:inline-flex;align-items:baseline;justify-content:center;background:#F0F8F2;border:2px solid #D0E8D6;border-radius:50%;width:64px;height:64px">' +
      '<span class="sf" style="font-size:24px;font-weight:700;color:#3D9060">'+(p.promedio||"\u2014")+'</span>' +
      (p.promedio>0?'<span style="font-size:10px;color:#9B9590">/5</span>':'') +
      '</div></div></div></div>';
    if (p.promedio > 0) {
      h += '<div style="display:flex;justify-content:center;margin:0 0 20px">'+radar(p.scores,220)+'</div>';
      h += '<h3 class="sf" style="font-size:18px;font-weight:600;margin-bottom:10px">Resultados por \u00e1rea</h3><div class="g3" style="margin-bottom:20px">';
      Object.entries(p.scores).forEach(function(e) {
        var k=e[0], v=e[1], c=COLORS[Math.min(v-1,4)];
        h += '<div class="card" style="border-left:3px solid '+c+';padding:10px 12px">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">' +
            '<span style="font-size:12px">'+ICONS[k]+' '+NAMES[k]+'</span>' +
            '<span style="font-size:12px;font-weight:700;color:'+c+'">'+v+'/5</span>' +
          '</div>' +
          '<div class="bt"><div class="bf" style="background:'+c+';width:'+(v/5*100)+'%"></div></div>' +
          '<p style="font-size:9px;color:#9B9590;margin-top:3px">'+LABELS[Math.min(v-1,4)]+'</p></div>';
      });
      h += '</div><h3 class="sf" style="font-size:18px;font-weight:600;margin-bottom:10px">\u00c1reas prioritarias</h3>';
      Object.entries(p.scores).sort(function(a,b){return a[1]-b[1]}).slice(0,3).forEach(function(e,i) {
        var k=e[0], v=e[1];
        h += '<div class="pri"'+(i===0?' style="background:#FEF2F0"':'')+' >' +
          '<span style="font-size:10px;font-weight:700;color:#C75B4A">#'+(i+1)+'</span>' +
          '<span style="font-size:16px">'+ICONS[k]+'</span>' +
          '<span style="font-size:13px;font-weight:600">'+NAMES[k]+'</span>' +
          '<span style="margin-left:auto;font-size:12px;font-weight:700;color:'+COLORS[Math.min(v-1,4)]+'">'+v+'/5</span></div>';
      });

      // ——— BLOQUE: RESUMEN PARA PACIENTE ———
      var summaryText = generateSummaryText(p);
      var summaryLines = summaryText.split("\n");
      var summaryHtml = summaryLines.map(function(line) {
        if (!line.trim()) return '<br>';
        if (line.startsWith("Hola ")) return '<p style="font-size:15px;font-weight:600;color:#2C2A25;margin-bottom:6px">'+line+'</p>';
        if (line.startsWith("\u2014\u2014\u2014")) return '<hr style="border:none;border-top:1.5px solid #EBE8E2;margin:12px 0">';
        if (line.startsWith("\ud83c\udfaf") || line.startsWith("\ud83d\udd0d") || line.startsWith("\u2728")) return '<p style="font-size:13px;font-weight:700;color:#2C2A25;letter-spacing:.4px;margin:12px 0 6px">'+line+'</p>';
        if (/^\d\./.test(line)) return '<p style="font-size:13px;font-weight:700;color:#3D9060;margin-bottom:4px">'+line+'</p>';
        if (line.startsWith("Con cari\u00f1o")) return '<p style="font-size:13px;font-style:italic;color:#9B9590;margin-top:4px">'+line+'</p>';
        if (line.startsWith("Dani Navarro")) return '<p style="font-size:13px;font-weight:600;color:#2C2A25">'+line+'</p>';
        return '<p style="font-size:13px;color:#5A5650;line-height:1.55;margin-bottom:2px">'+line+'</p>';
      }).join("");

      h += '<div style="background:linear-gradient(135deg,#F5FBF7 0%,#EEF8F2 100%);border:1.5px solid #C8E6D4;border-radius:18px;padding:24px;margin-top:24px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">' +
          '<div>' +
            '<h3 class="sf" style="font-size:20px;font-weight:600;color:#2C2A25">Resumen para el paciente</h3>' +
            '<p style="font-size:12px;color:#9B9590;margin-top:2px">Listo para copiar y enviar por WhatsApp o email</p>' +
          '</div>' +
          '<button id="copyBtn" style="display:flex;align-items:center;gap:6px;padding:9px 16px;background:#3D9060;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif;white-space:nowrap">'+
            '<span>\ud83d\udccb</span><span>Copiar texto</span>' +
          '</button>' +
        '</div>' +
        '<div id="summaryPreview" style="background:#fff;border:1.5px solid #D8EEE2;border-radius:12px;padding:20px 22px;line-height:1.6">' +
          summaryHtml +
        '</div>' +
        '<p id="copyFeedback" style="font-size:12px;color:#3D9060;font-weight:600;margin-top:10px;display:none">&#10003; \u00a1Texto copiado! Ya pod\u00e9s pegarlo en WhatsApp o email.</p>' +
      '</div>';

    } else {
      h += '<div style="background:#FFF9EC;border:1.5px solid #F5E6C0;border-radius:14px;padding:20px;text-align:center;margin-top:16px">' +
        '<span style="font-size:24px">\u26a0\ufe0f</span>' +
        '<p style="font-size:14px;color:#8B7A3D;margin-top:8px">Este paciente no tiene scores del quiz a\u00fan.</p></div>';
    }
    contentDiv.innerHTML = h;
    document.getElementById("backBtn").addEventListener("click", function() { renderList(); });
    if (p.promedio > 0) {
      document.getElementById("copyBtn").addEventListener("click", function() {
        var summaryText = generateSummaryText(p);
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(summaryText).then(function() {
            var fb = document.getElementById("copyFeedback");
            var btn = document.getElementById("copyBtn");
            fb.style.display = "block";
            btn.querySelector("span:last-child").textContent = "\u00a1Copiado!";
            setTimeout(function() {
              fb.style.display = "none";
              btn.querySelector("span:last-child").textContent = "Copiar texto";
            }, 3000);
          });
        } else {
          // fallback para navegadores sin clipboard API
          var ta = document.createElement("textarea");
          ta.value = summaryText;
          ta.style.position = "fixed"; ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select(); document.execCommand("copy");
          document.body.removeChild(ta);
          var fb = document.getElementById("copyFeedback");
          fb.style.display = "block";
          setTimeout(function(){ fb.style.display = "none"; }, 3000);
        }
      });
    }
  }

  // EVENT LISTENERS - using addEventListener (not inline onclick)
  loginBtn.addEventListener("click", function() { doLogin(); });
  keyInput.addEventListener("keydown", function(e) { if (e.key === "Enter") doLogin(); });

  // Event delegation for patient rows
  contentDiv.addEventListener("click", function(e) {
    var row = e.target.closest(".row");
    if (row && row.dataset.idx !== undefined) {
      showDetail(parseInt(row.dataset.idx));
    }
  });

  // Auto-login if key is in URL
  var urlParams = new URLSearchParams(window.location.search);
  var urlKey = urlParams.get("key");
  if (urlKey) {
    keyInput.value = urlKey;
    doLogin();
  }
})();
</script>
</body>
</html>
