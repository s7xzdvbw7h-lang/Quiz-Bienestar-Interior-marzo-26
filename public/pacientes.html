<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Panel de Pacientes | Mente Viva</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF9F6;font-family:"DM Sans",sans-serif;color:#2C2A25}
.sf{font-family:"Cormorant Garamond",Georgia,serif}
.mx{max-width:800px;margin:0 auto;padding:28px 16px 48px}
.card{background:#fff;border:1.5px solid #EBE8E2;border-radius:14px;padding:16px 18px;margin-bottom:10px}
.btn{width:100%;padding:14px;background:#3D9060;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px}
.bar{height:4px;border-radius:2px;background:#F2F0EB;overflow:hidden;margin:4px 0}
.bar div{height:100%;border-radius:2px}
.row{display:flex;align-items:center;gap:16px;cursor:pointer}
.row:hover{opacity:0.85}
.pri{border:1.5px solid #EBE8E2;border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.hid{display:none}
input:focus{outline:none;border-color:#3D9060!important}
</style>
</head>
<body>
<div id="L" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
<div class="card" style="border-radius:18px;padding:32px;text-align:center;max-width:400px;width:100%">
<div style="font-size:32px;margin-bottom:12px">&#128274;</div>
<h1 class="sf" style="font-size:24px;font-weight:600">Panel de Pacientes</h1>
<p style="font-size:13px;color:#9B9590;margin:6px 0 24px">Mente Viva</p>
<input type="password" id="K" placeholder="Clave de acceso" style="width:100%;padding:13px 16px;background:#FAFAF7;border:1.5px solid #EBE8E2;border-radius:10px;font-size:15px;color:#2C2A25;margin-bottom:12px">
<p id="E" style="color:#C75B4A;font-size:13px;margin-bottom:10px" class="hid"></p>
<button class="btn" id="LB">Ingresar</button>
</div>
</div>
<div id="D" class="hid"><div class="mx">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
<div><h1 class="sf" style="font-size:28px;font-weight:600">Panel de Pacientes</h1><p style="font-size:13px;color:#9B9590;margin-top:2px">Mente Viva</p></div>
<a href="/" style="font-size:13px;color:#3D9060;text-decoration:none;font-weight:600">Quiz</a>
</div>
<div class="g3" id="S"></div>
<div id="C"></div>
</div></div>
<script>
var CO=["#C75B4A","#D4895A","#D4A84A","#6BAF7B","#3D9060"];
var LB=["Necesita atencion","En riesgo","En desarrollo","Buen camino","Fortaleza"];
var BG=["#FEF2F0","#FFF5EE","#FFF9EC","#F0F8F2","#E8F5EC"];
var NM={sueno:"Sueno",alimentacion:"Alimentacion",movimiento:"Movimiento",estres:"Estres",emocional:"Emociones",naturaleza:"Naturaleza",vinculos:"Vinculos",suplementacion:"Suplementacion",digital:"Digital"};
var IC={sueno:"&#127769;",alimentacion:"&#129367;",movimiento:"&#127939;",estres:"&#129496;",emocional:"&#128156;",naturaleza:"&#127807;",vinculos:"&#129309;",suplementacion:"&#128138;",digital:"&#128241;"};
var ps=[];
document.getElementById("K").addEventListener("keydown",function(e){if(e.key==="Enter")go();});
document.getElementById("LB").addEventListener("click",function(){go();});
function go(){
var k=document.getElementById("K").value;
var er=document.getElementById("E");
er.className="hid";
fetch("/api/pacientes?key="+encodeURIComponent(k)).then(function(r){return r.json();}).then(function(d){
if(d.error){er.textContent=d.error;er.className="";return;}
ps=d.pacientes||[];
document.getElementById("L").className="hid";
document.getElementById("D").className="";
list();
}).catch(function(){er.textContent="Error de conexion";er.className="";});
}
function fmt(d){if(!d)return"-";return new Date(d).toLocaleDateString("es-AR",{day:"2-digit",month:"short",year:"numeric"});}
function rad(sc,sz){
var cx=sz/2,cy=sz/2,r=sz*0.38,ks=Object.keys(NM),n=ks.length,a=2*Math.PI/n,o=-Math.PI/2;
function pt(i,v){var an=o+i*a;return[cx+(v/5*r)*Math.cos(an),cy+(v/5*r)*Math.sin(an)];}
var s="<svg viewBox=\"0 0 "+sz+" "+sz+"\" width=\""+sz+"\" height=\""+sz+"\">";
for(var l=1;l<=5;l++){var p=ks.map(function(_,i){return pt(i,l).join(",");}).join(" ");s+="<polygon points=\""+p+"\" fill=\"none\" stroke=\"#E5E0D8\" stroke-width=\"0.5\"/>";}
var dp=ks.map(function(k,i){return pt(i,sc[k]||0).join(",");}).join(" ");
s+="<polygon points=\""+dp+"\" fill=\"rgba(61,144,96,0.15)\" stroke=\"#3D9060\" stroke-width=\"1.5\" stroke-linejoin=\"round\"/>";
ks.forEach(function(k,i){var pp=pt(i,sc[k]||0);var v=Math.min(Math.max(sc[k]||1,1),5);s+="<circle cx=\""+pp[0]+"\" cy=\""+pp[1]+"\" r=\"3\" fill=\""+CO[v-1]+"\" stroke=\"#fff\" stroke-width=\"1.5\"/>";});
return s+"</svg>";}
function list(){
var ws=ps.filter(function(p){return p.promedio>0;});
var av=ws.length>0?(ws.reduce(function(a,p){return a+p.promedio;},0)/ws.length).toFixed(1):"0";
document.getElementById("S").innerHTML="<div class=\"card\" style=\"text-align:center\"><span style=\"font-size:20px;display:block;margin-bottom:4px\">&#128101;</span><span class=\"sf\" style=\"font-size:22px;font-weight:700;display:block\">"+ps.length+"</span><span style=\"font-size:11px;color:#9B9590\">Total</span></div><div class=\"card\" style=\"text-align:center\"><span style=\"font-size:20px;display:block;margin-bottom:4px\">&#128202;</span><span class=\"sf\" style=\"font-size:22px;font-weight:700;display:block\">"+ws.length+"</span><span style=\"font-size:11px;color:#9B9590\">Con scores</span></div><div class=\"card\" style=\"text-align:center\"><span style=\"font-size:20px;display:block;margin-bottom:4px\">&#11088;</span><span class=\"sf\" style=\"font-size:22px;font-weight:700;display:block\">"+av+"/5</span><span style=\"font-size:11px;color:#9B9590\">Promedio</span></div>";
var h="<h2 class=\"sf\" style=\"font-size:20px;font-weight:600;margin-bottom:12px\">Todos ("+ps.length+")</h2>";
ps.forEach(function(p,i){
var pi=p.promedio<=2?0:p.promedio<=3?1:p.promedio<=4?3:4;
h+="<div class=\"card row\" onclick=\"det("+i+")\"><div>"+rad(p.scores,70)+"</div><div style=\"flex:1\"><div style=\"display:flex;justify-content:space-between;align-items:center\"><h3 style=\"font-size:16px;font-weight:600;margin:0\">"+p.nombre+"</h3>"+(p.promedio>0?"<span style=\"font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;background:"+BG[pi]+";color:"+CO[pi]+"\">"+p.promedio+"/5</span>":"")+"</div><p style=\"font-size:12px;color:#9B9590;margin-top:2px\">"+p.email+"</p><div style=\"display:flex;gap:12px;margin-top:6px;font-size:11px;color:#9B9590\"><span>"+fmt(p.fecha)+"</span><span>"+p.emails_sent+" emails</span><span>"+p.opens+" abiertos</span></div></div></div>";});
document.getElementById("C").innerHTML=h;}
function det(i){
var p=ps[i];
var h="<button style=\"background:none;border:none;font-size:14px;color:#3D9060;font-weight:600;cursor:pointer;margin-bottom:16px\" onclick=\"list()\">&#8592; Volver</button>";
h+="<div class=\"card\" style=\"border-radius:18px;padding:24px;margin-bottom:16px\"><div style=\"display:flex;justify-content:space-between\"><div><h2 class=\"sf\" style=\"font-size:24px;font-weight:600\">"+p.nombre+"</h2><p style=\"font-size:13px;color:#9B9590;margin-top:2px\">"+p.email+"</p><p style=\"font-size:12px;color:#9B9590;margin-top:4px\">"+fmt(p.fecha)+" | "+p.emails_sent+" emails, "+p.opens+" abiertos</p></div><div style=\"text-align:center\"><div style=\"display:inline-flex;align-items:baseline;justify-content:center;background:#F0F8F2;border:2px solid #D0E8D6;border-radius:50%;width:64px;height:64px\"><span class=\"sf\" style=\"font-size:24px;font-weight:700;color:#3D9060\">"+(p.promedio||"-")+"</span>"+(p.promedio>0?"<span style=\"font-size:10px;color:#9B9590\">/5</span>":"")+"</div></div></div></div>";
if(p.promedio>0){
h+="<div style=\"display:flex;justify-content:center;margin:0 0 20px\">"+rad(p.scores,220)+"</div>";
h+="<h3 class=\"sf\" style=\"font-size:18px;font-weight:600;margin-bottom:10px\">Resultados</h3><div class=\"g3\" style=\"margin-bottom:20px\">";
Object.entries(p.scores).forEach(function(e){var k=e[0],v=e[1];var c=CO[Math.min(Math.max(v-1,0),4)];
h+="<div class=\"card\" style=\"border-left:3px solid "+c+";padding:10px 12px\"><div style=\"display:flex;justify-content:space-between;margin-bottom:4px\"><span style=\"font-size:12px\">"+IC[k]+" "+NM[k]+"</span><span style=\"font-size:12px;font-weight:700;color:"+c+"\">"+v+"/5</span></div><div class=\"bar\"><div style=\"background:"+c+";width:"+(v/5*100)+"%\"></div></div><p style=\"font-size:9px;color:#9B9590\">"+LB[Math.min(Math.max(v-1,0),4)]+"</p></div>";});
h+="</div><h3 class=\"sf\" style=\"font-size:18px;font-weight:600;margin-bottom:10px\">Prioridades</h3>";
Object.entries(p.scores).sort(function(a,b){return a[1]-b[1];}).slice(0,3).forEach(function(e,j){var k=e[0],v=e[1];
h+="<div class=\"pri\""+(j===0?" style=\"background:#FEF2F0\"":"")+"><span style=\"font-size:10px;font-weight:700;color:#C75B4A\">#"+(j+1)+"</span><span style=\"font-size:16px\">"+IC[k]+"</span><span style=\"font-size:13px;font-weight:600\">"+NM[k]+"</span><span style=\"margin-left:auto;font-size:12px;font-weight:700;color:"+CO[Math.min(Math.max(v-1,0),4)]+"\">"+v+"/5</span></div>";});
}else{h+="<div style=\"background:#FFF9EC;border:1.5px solid #F5E6C0;border-radius:14px;padding:20px;text-align:center\"><p style=\"font-size:14px;color:#8B7A3D\">Sin scores del quiz aun.</p></div>";}
document.getElementById("C").innerHTML=h;}
</script>
</body>
</html>
