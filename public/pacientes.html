<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Panel de Pacientes | Mente Viva</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF9F6;font-family:'DM Sans',sans-serif;color:#2C2A25}
.sf{font-family:'Cormorant Garamond',Georgia,serif}
.wrap{max-width:800px;margin:0 auto;padding:28px 16px 48px}
.card{background:#fff;border:1.5px solid #EBE8E2;border-radius:14px;padding:16px 18px;margin-bottom:10px}
.card-lg{border-radius:18px;padding:28px 24px;margin-bottom:16px}
.btn{width:100%;padding:14px;background:#3D9060;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px}
.row{display:flex;align-items:center;gap:16px;cursor:pointer;transition:transform .2s}
.row:hover{transform:translateX(4px)}
.pill{font-size:13px;font-weight:700;padding:3px 12px;border-radius:20px}
.bt{height:4px;border-radius:2px;background:#F2F0EB;overflow:hidden;margin-bottom:5px}
.bf{height:100%;border-radius:2px}
.pri{border:1.5px solid #EBE8E2;border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.hide{display:none}
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
input:focus{outline:none;border-color:#3D9060;box-shadow:0 0 0 3px rgba(61,144,96,.08)}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="card card-lg" style="text-align:center;max-width:400px;width:100%">
    <div style="font-size:32px;margin-bottom:12px">&#128274;</div>
    <h1 class="sf" style="font-size:24px;font-weight:600">Panel de Pacientes</h1>
    <p style="font-size:13px;color:#9B9590;margin:6px 0 24px">Mente Viva &#183; Dani Navarro</p>
    <input type="password" id="keyInput" placeholder="Clave de acceso" style="width:100%;padding:13px 16px;background:#FAFAF7;border:1.5px solid #EBE8E2;border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;color:#2C2A25;margin-bottom:12px">
    <p id="errorMsg" style="color:#C75B4A;font-size:13px;margin-bottom:10px" class="hide"></p>
    <button class="btn" id="loginBtn">Ingresar</button>
  </div>
</div>

<div id="dashboard" class="hide">
  <div class="wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <div>
        <h1 class="sf" style="font-size:28px;font-weight:600">Panel de Pacientes</h1>
        <p style="font-size:13px;color:#9B9590;margin-top:2px">Mente Viva &#183; Quiz Bienestar</p>
      </div>
      <a href="/" style="font-size:13px;color:#3D9060;text-decoration:none;font-weight:600">&#8592; Quiz</a>
    </div>
    <div class="g3" id="statsDiv"></div>
    <div id="contentDiv"></div>
  </div>
</div>

<script>
(function(){
  var COLORS = ["#C75B4A","#D4895A","#D4A84A","#6BAF7B","#3D9060"];
  var LABELS = ["Necesita atenci\u00f3n","En riesgo","En desarrollo","Buen camino","Fortaleza"];
  var BGCOLORS = ["#FEF2F0","#FFF5EE","#FFF9EC","#F0F8F2","#E8F5EC"];
  var NAMES = {sueno:"Sue\u00f1o",alimentacion:"Alimentaci\u00f3n",movimiento:"Movimiento",estres:"Estr\u00e9s",emocional:"Emociones",naturaleza:"Naturaleza",vinculos:"V\u00ednculos",suplementacion:"Suplementaci\u00f3n",digital:"Digital"};
  var ICONS = {sueno:"\ud83c\udf19",alimentacion:"\ud83e\udd57",movimiento:"\ud83c\udfc3",estres:"\ud83e\uddd8\u200d\u2640\ufe0f",emocional:"\ud83d\udc9c",naturaleza:"\ud83c\udf3f",vinculos:"\ud83e\udd1d",suplementacion:"\ud83d\udc8a",digital:"\ud83d\udcf1"};
  var patients = [];

  var keyInput = document.getElementById("keyInput");
  var loginBtn = document.getElementById("loginBtn");
  var errorMsg = document.getElementById("errorMsg");
  var loginScreen = document.getElementById("loginScreen");
  var dashboardDiv = document.getElementById("dashboard");
  var statsDiv = document.getElementById("statsDiv");
  var contentDiv = document.getElementById("contentDiv");

  function doLogin() {
    var key = keyInput.value;
    if (!key) { showError("Ingres\u00e1 la clave"); return; }
    hideError();
    loginBtn.textContent = "Cargando...";
    fetch("/api/pacientes?key=" + encodeURIComponent(key))
      .then(function(r) { return r.json(); })
      .then(function(d) {
        loginBtn.textContent = "Ingresar";
        if (d.error) { showError(d.error); return; }
        patients = d.pacientes || [];
        loginScreen.style.display = "none";
        dashboardDiv.style.display = "block";
        renderList();
      })
      .catch(function(e) {
        loginBtn.textContent = "Ingresar";
        showError("Error de conexi\u00f3n");
      });
  }

  function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = "block"; }
  function hideError() { errorMsg.style.display = "none"; }

  function fmt(d) {
    if (!d) return "\u2014";
    return new Date(d).toLocaleDateString("es-AR", {day:"2-digit", month:"short", year:"numeric"});
  }

  function radar(sc, sz) {
    var cx=sz/2, cy=sz/2, r=sz*0.38, ks=Object.keys(NAMES), n=ks.length, step=2*Math.PI/n, off=-Math.PI/2;
    function pt(i,v) { var a=off+i*step; return [cx+(v/5*r)*Math.cos(a), cy+(v/5*r)*Math.sin(a)]; }
    var s = '<svg viewBox="0 0 '+sz+' '+sz+'" width="'+sz+'" height="'+sz+'">';
    for (var l=1; l<=5; l++) {
      var pts = ks.map(function(_,i){ return pt(i,l).join(","); }).join(" ");
      s += '<polygon points="'+pts+'" fill="none" stroke="#E5E0D8" stroke-width="'+(l===5?'1.2':'0.5')+'"/>';
    }
    var dp = ks.map(function(k,i){ return pt(i,sc[k]||0).join(","); }).join(" ");
    s += '<polygon points="'+dp+'" fill="rgba(61,144,96,0.15)" stroke="#3D9060" stroke-width="1.5" stroke-linejoin="round"/>';
    ks.forEach(function(k,i) {
      var p=pt(i,sc[k]||0), v=Math.min(Math.max(sc[k]||1,1),5);
      s += '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3" fill="'+COLORS[v-1]+'" stroke="#fff" stroke-width="1.5"/>';
    });
    return s + "</svg>";
  }

  function renderList() {
    var ws = patients.filter(function(p){ return p.promedio > 0; });
    var av = ws.length > 0 ? (ws.reduce(function(a,p){ return a+p.promedio; },0)/ws.length).toFixed(1) : "0";
    statsDiv.innerHTML =
      '<div class="card" style="text-align:center"><span style="font-size:20px;display:block;margin-bottom:4px">\ud83d\udc65</span><span class="sf" style="font-size:22px;font-weight:700;display:block">'+patients.length+'</span><span style="font-size:11px;color:#9B9590">Total</span></div>' +
      '<div class="card" style="text-align:center"><span style="font-size:20px;display:block;margin-bottom:4px">\ud83d\udcca</span><span class="sf" style="font-size:22px;font-weight:700;display:block">'+ws.length+'</span><span style="font-size:11px;color:#9B9590">Con scores</span></div>' +
      '<div class="card" style="text-align:center"><span style="font-size:20px;display:block;margin-bottom:4px">\u2b50</span><span class="sf" style="font-size:22px;font-weight:700;display:block">'+av+'/5</span><span style="font-size:11px;color:#9B9590">Promedio</span></div>';
    var h = '<h2 class="sf" style="font-size:20px;font-weight:600;margin-bottom:12px">Pacientes del Quiz</h2>';
    if (!patients.length) h += '<p style="color:#9B9590">No hay pacientes a\u00fan</p>';
    else patients.forEach(function(p, idx) {
      var pc = p.promedio<=2?0 : p.promedio<=3?1 : p.promedio<=4?3 : 4;
      h += '<div class="card row" data-idx="'+idx+'">' +
        '<div>'+radar(p.scores,70)+'</div>' +
        '<div style="flex:1">' +
          '<div style="display:flex;justify-content:space-between;align-items:center">' +
            '<h3 style="font-size:16px;font-weight:600;margin:0">'+p.nombre+'</h3>' +
            (p.promedio>0 ? '<span class="pill" style="background:'+BGCOLORS[pc]+';color:'+COLORS[pc]+'">'+p.promedio+'/5</span>' : '') +
          '</div>' +
          '<p style="font-size:12px;color:#9B9590;margin-top:2px">'+p.email+'</p>' +
          '<div style="display:flex;gap:12px;margin-top:6px;font-size:11px;color:#9B9590">' +
            '<span>\ud83d\udcc5 '+fmt(p.fecha)+'</span>' +
            '<span>\ud83d\udce7 '+p.emails_sent+' enviados</span>' +
            '<span>\ud83d\udc41 '+p.opens+' abiertos</span>' +
          '</div>' +
        '</div>' +
        '<span style="font-size:18px;color:#D0D0D0">\u2192</span>' +
      '</div>';
    });
    contentDiv.innerHTML = h;
  }

  function showDetail(idx) {
    var p = patients[idx];
    var h = '<button id="backBtn" style="background:none;border:none;font-size:14px;color:#3D9060;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif;margin-bottom:16px">&#8592; Volver</button>';
    h += '<div class="card card-lg"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div>' +
      '<h2 class="sf" style="font-size:24px;font-weight:600">'+p.nombre+'</h2>' +
      '<p style="font-size:13px;color:#9B9590;margin-top:2px">'+p.email+'</p>' +
      '<p style="font-size:12px;color:#9B9590;margin-top:4px">Registrado: '+fmt(p.fecha)+' &#183; '+p.emails_sent+' emails, '+p.opens+' abiertos</p>' +
      '</div><div style="text-align:center"><div style="display:inline-flex;align-items:baseline;justify-content:center;background:#F0F8F2;border:2px solid #D0E8D6;border-radius:50%;width:64px;height:64px">' +
      '<span class="sf" style="font-size:24px;font-weight:700;color:#3D9060">'+(p.promedio||"\u2014")+'</span>' +
      (p.promedio>0?'<span style="font-size:10px;color:#9B9590">/5</span>':'') +
      '</div></div></div></div>';
    if (p.promedio > 0) {
      h += '<div style="display:flex;justify-content:center;margin:0 0 20px">'+radar(p.scores,220)+'</div>';
      h += '<h3 class="sf" style="font-size:18px;font-weight:600;margin-bottom:10px">Resultados por \u00e1rea</h3><div class="g3" style="margin-bottom:20px">';
      Object.entries(p.scores).forEach(function(e) {
        var k=e[0], v=e[1], c=COLORS[Math.min(v-1,4)];
        h += '<div class="card" style="border-left:3px solid '+c+';padding:10px 12px">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">' +
            '<span style="font-size:12px">'+ICONS[k]+' '+NAMES[k]+'</span>' +
            '<span style="font-size:12px;font-weight:700;color:'+c+'">'+v+'/5</span>' +
          '</div>' +
          '<div class="bt"><div class="bf" style="background:'+c+';width:'+(v/5*100)+'%"></div></div>' +
          '<p style="font-size:9px;color:#9B9590;margin-top:3px">'+LABELS[Math.min(v-1,4)]+'</p></div>';
      });
      h += '</div><h3 class="sf" style="font-size:18px;font-weight:600;margin-bottom:10px">\u00c1reas prioritarias</h3>';
      Object.entries(p.scores).sort(function(a,b){return a[1]-b[1]}).slice(0,3).forEach(function(e,i) {
        var k=e[0], v=e[1];
        h += '<div class="pri"'+(i===0?' style="background:#FEF2F0"':'')+' >' +
          '<span style="font-size:10px;font-weight:700;color:#C75B4A">#'+(i+1)+'</span>' +
          '<span style="font-size:16px">'+ICONS[k]+'</span>' +
          '<span style="font-size:13px;font-weight:600">'+NAMES[k]+'</span>' +
          '<span style="margin-left:auto;font-size:12px;font-weight:700;color:'+COLORS[Math.min(v-1,4)]+'">'+v+'/5</span></div>';
      });
    } else {
      h += '<div style="background:#FFF9EC;border:1.5px solid #F5E6C0;border-radius:14px;padding:20px;text-align:center;margin-top:16px">' +
        '<span style="font-size:24px">\u26a0\ufe0f</span>' +
        '<p style="font-size:14px;color:#8B7A3D;margin-top:8px">Este paciente no tiene scores del quiz a\u00fan.</p></div>';
    }
    contentDiv.innerHTML = h;
    document.getElementById("backBtn").addEventListener("click", function() { renderList(); });
  }

  // EVENT LISTENERS - using addEventListener (not inline onclick)
  loginBtn.addEventListener("click", function() { doLogin(); });
  keyInput.addEventListener("keydown", function(e) { if (e.key === "Enter") doLogin(); });

  // Event delegation for patient rows
  contentDiv.addEventListener("click", function(e) {
    var row = e.target.closest(".row");
    if (row && row.dataset.idx !== undefined) {
      showDetail(parseInt(row.dataset.idx));
    }
  });

  // Auto-login if key is in URL
  var urlParams = new URLSearchParams(window.location.search);
  var urlKey = urlParams.get("key");
  if (urlKey) {
    keyInput.value = urlKey;
    doLogin();
  }
})();
</script>
</body>
</html>
